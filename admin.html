<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — MindOnline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:   #080808;
    --bg2:  #0f0f0f;
    --bg3:  #171717;
    --bg4:  #202020;
    --gold: #f5c842;
    --gold2:#ffd966;
    --golddim:rgba(245,200,66,.1);
    --border:rgba(255,255,255,.08);
    --white:#e8eaed;
    --muted:#5f6368;
    --red:  #f4212e;
    --green:#00ba7c;
    --title:'Syne',sans-serif;
    --body: 'DM Sans',sans-serif;
  }
  body {
    background:var(--bg); color:var(--white);
    font-family:var(--body); font-size:15px;
    line-height:1.5; min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
 
  /* ══ LOGIN ══ */
  #loginPage {
    min-height:100vh; display:flex;
    align-items:center; justify-content:center;
    padding:24px;
    background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,200,66,.06) 0%, transparent 70%);
  }
  .login-wrap { width:100%; max-width:400px; }
  .login-logo {
    font-family:var(--title); font-size:28px; font-weight:800;
    color:var(--gold); letter-spacing:-1px; margin-bottom:32px;
    display:flex; align-items:center; gap:10px;
  }
  .login-logo-dot {
    width:9px; height:9px; background:var(--gold); border-radius:50%;
    box-shadow:0 0 12px var(--gold);
    animation:ldot 2.5s ease-in-out infinite;
  }
  @keyframes ldot{ 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);} }
  .login-card {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:20px; padding:36px;
    box-shadow:0 40px 80px rgba(0,0,0,.5);
  }
  .login-title { font-family:var(--title); font-size:22px; font-weight:800; margin-bottom:6px; }
  .login-sub { font-size:14px; color:var(--muted); margin-bottom:28px; }
  .inp {
    width:100%; background:var(--bg3); border:1px solid var(--border);
    border-radius:10px; padding:12px 16px; color:var(--white);
    font-size:15px; font-family:var(--body); outline:none;
    transition:border-color .2s, box-shadow .2s; margin-bottom:14px;
  }
  .inp:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(245,200,66,.12); }
  .inp::placeholder { color:var(--muted); }
  .login-btn {
    width:100%; background:var(--gold); color:#000; border:none;
    border-radius:10px; padding:13px; font-size:15px; font-weight:700;
    cursor:pointer; transition:all .25s; font-family:var(--body);
  }
  .login-btn:hover { background:var(--gold2); transform:translateY(-1px); box-shadow:0 8px 24px rgba(245,200,66,.3); }
  .login-err {
    font-size:13px; color:var(--red); margin-top:12px;
    display:none; background:rgba(244,33,46,.08);
    border:1px solid rgba(244,33,46,.15); border-radius:8px;
    padding:8px 12px; text-align:center;
  }
 
  /* ══ APP LAYOUT ══ */
  #appPage { display:none; min-height:100vh; }
 
  .app-sidebar {
    width:240px; position:fixed; top:0; left:0; bottom:0;
    background:var(--bg2); border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    padding:24px 16px; z-index:100;
    transition:transform .3s cubic-bezier(.16,1,.3,1);
  }
  .sidebar-logo {
    font-family:var(--title); font-size:18px; font-weight:800;
    color:var(--gold); display:flex; align-items:center; gap:8px;
    padding:8px 12px; margin-bottom:28px; letter-spacing:-.3px;
  }
  .sidebar-logo-dot {
    width:8px; height:8px; background:var(--gold); border-radius:50%;
    box-shadow:0 0 10px var(--gold);
    animation:ldot 2.5s ease-in-out infinite;
  }
  .sidebar-nav { display:flex; flex-direction:column; gap:2px; flex:1; }
  .snav-item {
    display:flex; align-items:center; gap:12px;
    padding:11px 14px; border-radius:10px;
    font-size:14px; font-weight:500; color:var(--muted);
    cursor:pointer; border:none; background:none;
    width:100%; text-align:left; transition:all .2s;
    font-family:var(--body);
  }
  .snav-item:hover { background:rgba(255,255,255,.05); color:var(--white); }
  .snav-item.active { background:var(--golddim); color:var(--gold); font-weight:700; }
  .snav-icon { font-size:17px; width:20px; text-align:center; flex-shrink:0; }
  .sidebar-footer { margin-top:auto; }
  .sidebar-logout {
    display:flex; align-items:center; gap:10px;
    padding:11px 14px; border-radius:10px;
    font-size:14px; color:var(--muted); cursor:pointer;
    border:none; background:none; width:100%; text-align:left;
    transition:all .2s; font-family:var(--body);
  }
  .sidebar-logout:hover { background:rgba(244,33,46,.08); color:var(--red); }
 
  .app-main {
    margin-left:240px; min-height:100vh;
    padding:0; display:flex; flex-direction:column;
  }
  .app-topbar {
    background:rgba(8,8,8,.9); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    padding:16px 32px; display:flex; align-items:center;
    justify-content:space-between; position:sticky; top:0; z-index:10;
  }
  .topbar-title { font-family:var(--title); font-size:18px; font-weight:800; }
  .topbar-refresh {
    background:var(--bg3); border:1px solid var(--border);
    border-radius:8px; padding:7px 14px; font-size:13px;
    font-weight:600; color:var(--white); cursor:pointer;
    transition:all .2s; font-family:var(--body);
    display:flex; align-items:center; gap:6px;
  }
  .topbar-refresh:hover { border-color:rgba(245,200,66,.3); color:var(--gold); }
  .app-content { padding:28px 32px; flex:1; }
 
  /* ══ PAGES ══ */
  .page { display:none; }
  .page.active { display:block; }
 
  /* ══ STATS GRID ══ */
  .stats-grid {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:14px; margin-bottom:28px;
  }
  .stat-card {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:16px; padding:22px 24px;
    position:relative; overflow:hidden;
    transition:border-color .2s, transform .3s;
  }
  .stat-card:hover { border-color:rgba(245,200,66,.25); transform:translateY(-2px); }
  .stat-card::before {
    content:''; position:absolute; top:0; left:0; right:0;
    height:2px; background:var(--gold); opacity:.6;
  }
  .stat-card:nth-child(2)::before { background:var(--green); }
  .stat-card:nth-child(3)::before { background:#1d9bf0; }
  .stat-n {
    font-family:var(--title); font-size:36px; font-weight:800;
    line-height:1; margin-bottom:6px; display:block;
  }
  .stat-l { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
 
  /* ══ CARDS ══ */
  .section-card {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:16px; overflow:hidden; margin-bottom:16px;
  }
  .section-card-title {
    font-family:var(--title); font-size:15px; font-weight:700;
    padding:14px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:8px;
    background:rgba(255,255,255,.02);
  }
 
  /* ══ MENSAGEM CARDS ══ */
  .msg-card {
    background:var(--bg3); border:1px solid var(--border);
    border-radius:14px; padding:22px; margin-bottom:12px;
    transition:border-color .25s, box-shadow .25s;
  }
  .msg-card:hover { border-color:rgba(245,200,66,.2); box-shadow:0 8px 32px rgba(0,0,0,.3); }
  .msg-top {
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:12px; margin-bottom:12px; flex-wrap:wrap;
  }
  .msg-nome { font-family:var(--title); font-size:17px; font-weight:700; }
  .msg-data { font-size:11px; color:var(--muted); font-family:monospace; flex-shrink:0; margin-top:3px; }
  .msg-info { display:flex; gap:16px; margin-bottom:14px; flex-wrap:wrap; }
  .msg-info span { font-size:13px; color:#aaa; display:flex; align-items:center; gap:5px; }
  .msg-info span strong { color:var(--gold); }
  .msg-texto {
    font-size:14px; color:#ccc; line-height:1.7;
    background:var(--bg4); padding:14px 16px;
    border-left:2px solid var(--gold); border-radius:0 8px 8px 0;
  }
  .badge-sim { background:rgba(0,186,124,.12); color:var(--green); font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; border:1px solid rgba(0,186,124,.2); }
  .badge-nao { background:rgba(255,255,255,.05); color:var(--muted); font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; border:1px solid var(--border); }
 
  /* ══ FILTROS ══ */
  .filter-bar {
    display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;
    align-items:center;
  }
  .filter-input {
    background:var(--bg3); border:1px solid var(--border);
    border-radius:9999px; padding:8px 16px 8px 38px;
    font-size:14px; color:var(--white); outline:none;
    width:220px; transition:border-color .2s; font-family:var(--body);
    position:relative;
  }
  .filter-input:focus { border-color:var(--gold); }
  .filter-input::placeholder { color:var(--muted); }
  .filter-wrap { position:relative; }
  .filter-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px; pointer-events:none; }
  .filter-btn {
    background:var(--bg3); border:1px solid var(--border); border-radius:9999px;
    padding:8px 16px; font-size:13px; font-weight:600; color:var(--muted);
    cursor:pointer; transition:all .2s; font-family:var(--body);
  }
  .filter-btn:hover, .filter-btn.active { background:var(--golddim); border-color:rgba(245,200,66,.3); color:var(--gold); }
  .msg-count { font-size:13px; color:var(--muted); margin-left:auto; }
 
  /* ══ EMPTY / LOADING ══ */
  .empty-state {
    text-align:center; padding:60px 24px; color:var(--muted);
  }
  .empty-icon { font-size:44px; margin-bottom:14px; display:block; }
  .empty-state h3 { font-family:var(--title); font-size:20px; color:var(--white); margin-bottom:6px; }
  .spinner-wrap { display:flex; align-items:center; justify-content:center; padding:60px; }
  .spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
 
  /* ══ MOBILE ══ */
  .menu-toggle-mob {
    display:none; background:none; border:none; color:var(--white);
    font-size:22px; cursor:pointer; padding:6px;
  }
  @media(max-width:768px) {
    .app-sidebar { transform:translateX(-100%); }
    .app-sidebar.open { transform:translateX(0); }
    .app-main { margin-left:0; }
    .menu-toggle-mob { display:block; }
    .stats-grid { grid-template-columns:1fr; }
    .app-content { padding:20px 16px; }
    .sidebar-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:99; display:none; }
    .sidebar-overlay.open { display:block; }
  }
  </style>
</head>
<body>
 
<!-- ══ LOGIN ══ -->
<div id="loginPage">
  <div class="login-wrap">
    <div class="login-logo">
      <span class="login-logo-dot"></span>
      MindOnline Admin
    </div>
    <div class="login-card">
      <div class="login-title">Painel Administrativo</div>
      <div class="login-sub">Acesso restrito — equipe autorizada</div>
      <input type="password" class="inp" id="senhaInput" placeholder="Digite a senha de acesso" onkeydown="if(event.key==='Enter')entrar()">
      <button class="login-btn" onclick="entrar()">Entrar →</button>
      <div class="login-err" id="erroMsg">❌ Senha incorreta. Tente novamente.</div>
    </div>
  </div>
</div>
 
<!-- ══ APP ══ -->
<div id="appPage">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
 
  <aside class="app-sidebar" id="appSidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-dot"></span>
      MindOnline
    </div>
    <nav class="sidebar-nav">
      <button class="snav-item active" data-page="dashboard" onclick="goPage(this,'dashboard')">
        <span class="snav-icon">📊</span> Dashboard
      </button>
      <button class="snav-item" data-page="mensagens" onclick="goPage(this,'mensagens')">
        <span class="snav-icon">✉️</span> Mensagens
      </button>
      <button class="snav-item" data-page="novidades" onclick="goPage(this,'novidades')">
        <span class="snav-icon">🔔</span> Querem Novidades
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-logout" onclick="sair()">
        <span style="font-size:16px">🚪</span> Sair
      </button>
    </div>
  </aside>
 
  <div class="app-main">
    <div class="app-topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="menu-toggle-mob" onclick="toggleSidebar()">☰</button>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
      </div>
      <button class="topbar-refresh" onclick="recarregar()">
        <span id="refreshIcon">↻</span> Atualizar
      </button>
    </div>
 
    <div class="app-content">
 
      <!-- DASHBOARD -->
      <div class="page active" id="page-dashboard">
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <span class="stat-n" id="statTotal">—</span>
            <span class="stat-l">✉️ Mensagens recebidas</span>
          </div>
          <div class="stat-card">
            <span class="stat-n" id="statNovidades">—</span>
            <span class="stat-l">🔔 Querem novidades</span>
          </div>
          <div class="stat-card">
            <span class="stat-n" id="statUltima">—</span>
            <span class="stat-l">📅 Última mensagem</span>
          </div>
        </div>
        <div class="section-card">
          <div class="section-card-title">✉️ Mensagens recentes</div>
          <div style="padding:20px;" id="dashRecentes">
            <div class="spinner-wrap"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
 
      <!-- MENSAGENS -->
      <div class="page" id="page-mensagens">
        <div class="filter-bar">
          <div class="filter-wrap">
            <span class="filter-icon">🔍</span>
            <input class="filter-input" id="searchInput" placeholder="Buscar por nome ou e-mail" oninput="filtrarMensagens()">
          </div>
          <button class="filter-btn active" id="filtAll" onclick="setFilter('all',this)">Todas</button>
          <button class="filter-btn" id="filtSim" onclick="setFilter('sim',this)">Querem novidades</button>
          <button class="filter-btn" id="filtNao" onclick="setFilter('nao',this)">Não querem</button>
          <span class="msg-count" id="msgCount"></span>
        </div>
        <div id="listaMensagens">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>
 
      <!-- NOVIDADES -->
      <div class="page" id="page-novidades">
        <div class="section-card">
          <div class="section-card-title">🔔 Contatos que querem receber novidades</div>
          <div style="padding:20px;" id="listaNovidades">
            <div class="spinner-wrap"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
 
    </div>
  </div>
</div>
 
<script>
const SENHA = '415263';
let MSGS = [];
let CURRENT_FILTER = 'all';
 
/* ══ AUTH ══ */
function entrar() {
  const v = document.getElementById('senhaInput').value;
  if (v === SENHA) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').style.display = 'block';
    carregarTudo();
  } else {
    document.getElementById('erroMsg').style.display = 'block';
    document.getElementById('senhaInput').value = '';
    document.getElementById('senhaInput').focus();
    setTimeout(() => document.getElementById('erroMsg').style.display='none', 3000);
  }
}
 
function sair() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appPage').style.display = 'none';
  document.getElementById('senhaInput').value = '';
  MSGS = [];
}
 
/* ══ SIDEBAR MOBILE ══ */
function toggleSidebar() {
  document.getElementById('appSidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('appSidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}
 
/* ══ NAVEGAÇÃO ══ */
function goPage(btn, page) {
  document.querySelectorAll('.snav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const titles = { dashboard:'Dashboard', mensagens:'Mensagens', novidades:'Querem Novidades' };
  document.getElementById('topbarTitle').textContent = titles[page] || page;
  closeSidebar();
 
  if (page === 'novidades') renderNovidades();
  if (page === 'mensagens') renderMensagens();
}
 
/* ══ CARREGAR ══ */
async function carregarTudo() {
  try {
    const res = await fetch('/.netlify/functions/mensagens');
    const dados = await res.json();
    MSGS = dados.mensagens || [];
    renderDashboard();
    renderMensagens();
  } catch(e) {
    mostrarErro('dashRecentes');
    mostrarErro('listaMensagens');
  }
}
 
function recarregar() {
  const ic = document.getElementById('refreshIcon');
  ic.style.display = 'inline-block';
  ic.style.animation = 'spin .7s linear infinite';
  carregarTudo().finally(() => {
    ic.style.animation = '';
  });
}
 
/* ══ DASHBOARD ══ */
function renderDashboard() {
  const total = MSGS.length;
  const novs  = MSGS.filter(m => m.novidades === 'sim').length;
  document.getElementById('statTotal').textContent     = total;
  document.getElementById('statNovidades').textContent = novs;
 
  if (total > 0) {
    const d = new Date(MSGS[0].criado_em);
    document.getElementById('statUltima').textContent =
      d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
  } else {
    document.getElementById('statUltima').textContent = '—';
  }
 
  const recentes = MSGS.slice(0, 3);
  if (!recentes.length) {
    document.getElementById('dashRecentes').innerHTML = emptyHTML('Nenhuma mensagem ainda', 'As mensagens do formulário aparecerão aqui.');
    return;
  }
  document.getElementById('dashRecentes').innerHTML = recentes.map(msgCard).join('');
}
 
/* ══ MENSAGENS ══ */
function renderMensagens() {
  filtrarMensagens();
}
 
function filtrarMensagens() {
  const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
  let lista = MSGS;
 
  if (CURRENT_FILTER === 'sim') lista = lista.filter(m => m.novidades === 'sim');
  if (CURRENT_FILTER === 'nao') lista = lista.filter(m => m.novidades === 'nao');
  if (q) lista = lista.filter(m =>
    (m.nome||'').toLowerCase().includes(q) ||
    (m.email||'').toLowerCase().includes(q) ||
    (m.mensagem||'').toLowerCase().includes(q)
  );
 
  const count = document.getElementById('msgCount');
  if (count) count.textContent = lista.length + ' resultado' + (lista.length !== 1 ? 's' : '');
 
  const el = document.getElementById('listaMensagens');
  if (!lista.length) {
    el.innerHTML = emptyHTML('Nenhuma mensagem', 'Tente mudar os filtros de busca.');
    return;
  }
  el.innerHTML = lista.map(msgCard).join('');
}
 
function setFilter(f, btn) {
  CURRENT_FILTER = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtrarMensagens();
}
 
/* ══ NOVIDADES ══ */
function renderNovidades() {
  const lista = MSGS.filter(m => m.novidades === 'sim');
  const el = document.getElementById('listaNovidades');
  if (!lista.length) {
    el.innerHTML = emptyHTML('Nenhum contato ainda', 'As pessoas que quiserem novidades aparecerão aqui.');
    return;
  }
  el.innerHTML = `
    <div style="margin-bottom:16px;font-size:13px;color:var(--muted);">${lista.length} contato${lista.length!==1?'s':''} registrado${lista.length!==1?'s':''}</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      ${lista.map(m => `
        <div style="display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;">
          <div style="width:40px;height:40px;border-radius:50%;background:rgba(245,200,66,.15);color:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--title);font-size:14px;font-weight:700;flex-shrink:0;">${(m.nome||'?').slice(0,2).toUpperCase()}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:14px;font-weight:700;">${esc(m.nome||'?')}</div>
            <div style="font-size:13px;color:var(--muted);">${esc(m.email||'')}</div>
          </div>
          <a href="mailto:${esc(m.email||'')}" style="background:var(--golddim);color:var(--gold);border:1px solid rgba(245,200,66,.2);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;text-decoration:none;transition:all .2s;white-space:nowrap;" onmouseover="this.style.background='var(--gold)';this.style.color='#000'" onmouseout="this.style.background='var(--golddim)';this.style.color='var(--gold)'">Enviar e-mail</a>
        </div>`).join('')}
    </div>`;
}
 
/* ══ HELPERS ══ */
function msgCard(m) {
  const data = new Date(m.criado_em).toLocaleString('pt-BR');
  return `
    <div class="msg-card">
      <div class="msg-top">
        <span class="msg-nome">${esc(m.nome||'Sem nome')}</span>
        <span class="msg-data">${data}</span>
      </div>
      <div class="msg-info">
        <span>✉️ <strong>${esc(m.email||'')}</strong></span>
        ${m.telefone ? `<span>📞 <strong>${esc(m.telefone)}</strong></span>` : ''}
        <span>Novidades: <span class="badge-${m.novidades==='sim'?'sim':'nao'}">${m.novidades==='sim'?'✓ Sim':'Não'}</span></span>
      </div>
      <div class="msg-texto">${esc(m.mensagem||'')}</div>
    </div>`;
}
 
function emptyHTML(title, sub) {
  return `<div class="empty-state"><span class="empty-icon">📭</span><h3>${title}</h3><p>${sub}</p></div>`;
}
 
function mostrarErro(id) {
  const el = document.getElementById(id);
  if(el) el.innerHTML = emptyHTML('Erro ao carregar', 'Não foi possível buscar os dados. Tente novamente.');
}
 
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
