<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — MindOnline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-login {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .login-box {
      background: var(--preto-2);
      border: 1px solid var(--cinza);
      padding: 48px;
      width: 100%;
      max-width: 400px;
    }

    .login-box h1 {
      font-family: var(--fonte-titulo);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .login-box h1 span { color: var(--amarelo); }

    .login-box p {
      font-size: 14px;
      color: var(--cinza-claro);
      margin-bottom: 32px;
    }

    .login-input {
      width: 100%;
      background: var(--preto-3);
      border: 1px solid var(--cinza);
      color: var(--branco);
      font-family: var(--fonte-corpo);
      font-size: 15px;
      padding: 14px 18px;
      border-radius: 2px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.3s;
    }

    .login-input:focus { border-color: var(--amarelo); }

    .login-btn {
      width: 100%;
      background: var(--amarelo);
      color: #000;
      font-family: var(--fonte-corpo);
      font-size: 15px;
      font-weight: 500;
      padding: 14px;
      border: none;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.3s;
    }

    .login-btn:hover { background: var(--amarelo-dark); }

    .login-erro {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* PAINEL */
    .admin-painel { display: none; padding: 40px 24px; max-width: 1100px; margin: 0 auto; }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 48px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .admin-header h1 {
      font-family: var(--fonte-titulo);
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .admin-header h1 span { color: var(--amarelo); }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--preto-2);
      border: 1px solid var(--cinza);
      padding: 24px;
      text-align: center;
    }

    .stat-card .num {
      font-family: var(--fonte-titulo);
      font-size: 40px;
      font-weight: 800;
      color: var(--amarelo);
      display: block;
    }

    .stat-card .label {
      font-size: 12px;
      color: var(--cinza-claro);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .mensagens-lista {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .mensagem-card {
      background: var(--preto-2);
      border: 1px solid var(--cinza);
      padding: 28px;
      transition: border-color 0.3s;
    }

    .mensagem-card:hover { border-color: rgba(245,200,66,0.3); }

    .mensagem-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .mensagem-nome {
      font-family: var(--fonte-titulo);
      font-size: 18px;
      font-weight: 700;
      color: var(--branco);
    }

    .mensagem-data {
      font-size: 12px;
      color: var(--cinza-claro);
      font-family: monospace;
      flex-shrink: 0;
    }

    .mensagem-info {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .mensagem-info span {
      font-size: 13px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mensagem-info span strong { color: var(--amarelo); }

    .mensagem-texto {
      font-size: 14px;
      color: #ccc;
      line-height: 1.7;
      background: var(--preto-3);
      padding: 16px;
      border-left: 2px solid var(--amarelo);
    }

    .badge-novidades {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 100px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .badge-sim { background: rgba(46,204,113,0.15); color: #2ecc71; }
    .badge-nao { background: rgba(136,136,136,0.15); color: #888; }

    .sair-btn {
      background: transparent;
      border: 1px solid var(--cinza);
      color: var(--cinza-claro);
      font-family: var(--fonte-corpo);
      font-size: 13px;
      padding: 8px 20px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.3s;
    }

    .sair-btn:hover { border-color: var(--amarelo); color: var(--amarelo); }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--cinza-claro);
      font-size: 15px;
    }

    .vazio {
      text-align: center;
      padding: 80px 40px;
      color: var(--cinza-claro);
      border: 1px dashed var(--cinza);
    }

    .vazio h3 {
      font-family: var(--fonte-titulo);
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--branco);
    }

    @media (max-width: 600px) {
      .login-box { padding: 32px 24px; }
      .admin-stats { grid-template-columns: 1fr; }
      .admin-painel { padding: 24px 16px; }
    }
  </style>
</head>
<body>

  <!-- TELA DE LOGIN -->
  <div class="admin-login" id="telaLogin">
    <div class="login-box">
      <h1>Mind<span>Online</span></h1>
      <p>Painel administrativo — acesso restrito</p>
      <input type="password" class="login-input" id="senhaInput" placeholder="Digite a senha" onkeydown="if(event.key==='Enter') entrar()">
      <button class="login-btn" onclick="entrar()">Entrar →</button>
      <p class="login-erro" id="erroMsg">Senha incorreta. Tente novamente.</p>
    </div>
  </div>

  <!-- PAINEL ADMIN -->
  <div class="admin-painel" id="painelAdmin">
    <div class="admin-header">
      <h1>Painel <span>Admin</span></h1>
      <button class="sair-btn" onclick="sair()">Sair</button>
    </div>

    <div class="admin-stats" id="statsArea">
      <div class="stat-card">
        <span class="num" id="totalMensagens">—</span>
        <span class="label">Mensagens recebidas</span>
      </div>
      <div class="stat-card">
        <span class="num" id="totalNovidades">—</span>
        <span class="label">Querem novidades</span>
      </div>
      <div class="stat-card">
        <span class="num" id="ultimaMensagem">—</span>
        <span class="label">Última mensagem</span>
      </div>
    </div>

    <div class="mensagens-lista" id="mensagensLista">
      <div class="loading">Carregando mensagens...</div>
    </div>
  </div>

  <script>
    const SENHA = '415263';

    function entrar() {
      const senha = document.getElementById('senhaInput').value;
      if (senha === SENHA) {
        document.getElementById('telaLogin').style.display = 'none';
        document.getElementById('painelAdmin').style.display = 'block';
        carregarMensagens();
      } else {
        document.getElementById('erroMsg').style.display = 'block';
        document.getElementById('senhaInput').value = '';
        document.getElementById('senhaInput').focus();
      }
    }

    function sair() {
      document.getElementById('telaLogin').style.display = 'flex';
      document.getElementById('painelAdmin').style.display = 'none';
      document.getElementById('senhaInput').value = '';
    }

    async function carregarMensagens() {
      try {
        const res = await fetch('/.netlify/functions/mensagens');
        const dados = await res.json();

        if (!dados.mensagens || dados.mensagens.length === 0) {
          document.getElementById('mensagensLista').innerHTML = `
            <div class="vazio">
              <h3>Nenhuma mensagem ainda</h3>
              <p>As mensagens enviadas pelo formulário aparecerão aqui.</p>
            </div>`;
          document.getElementById('totalMensagens').textContent = '0';
          document.getElementById('totalNovidades').textContent = '0';
          document.getElementById('ultimaMensagem').textContent = '—';
          return;
        }

        const msgs = dados.mensagens;
        document.getElementById('totalMensagens').textContent = msgs.length;
        document.getElementById('totalNovidades').textContent = msgs.filter(m => m.novidades === 'sim').length;

        const ultima = new Date(msgs[0].criado_em);
        document.getElementById('ultimaMensagem').textContent =
          ultima.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });

        document.getElementById('mensagensLista').innerHTML = msgs.map(m => {
          const data = new Date(m.criado_em).toLocaleString('pt-BR');
          return `
            <div class="mensagem-card">
              <div class="mensagem-top">
                <span class="mensagem-nome">${m.nome}</span>
                <span class="mensagem-data">${data}</span>
              </div>
              <div class="mensagem-info">
                <span>✉️ <strong>${m.email}</strong></span>
                ${m.telefone ? `<span>📞 <strong>${m.telefone}</strong></span>` : ''}
                <span>Novidades: <span class="badge-novidades badge-${m.novidades}">${m.novidades}</span></span>
              </div>
              <div class="mensagem-texto">${m.mensagem}</div>
            </div>`;
        }).join('');

      } catch (err) {
        document.getElementById('mensagensLista').innerHTML = `
          <div class="vazio">
            <h3>Erro ao carregar</h3>
            <p>Não foi possível buscar as mensagens. Tente novamente.</p>
          </div>`;
      }
    }
  </script>
</body>
</html>
